apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: hpa-overshoot
data:
  config.yaml: |
    externalRules:
    - seriesQuery: 'queue_length{namespace!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
      metricsQuery: 'queue_length{<<.LabelMatchers>>}'
      name:
        as: "queue_length"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-adapter
  namespace: hpa-overshoot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-adapter
  template:
    metadata:
      labels:
        app: prometheus-adapter
    spec:
      serviceAccountName: prometheus-adapter
      containers:
      - name: adapter
        image: registry.k8s.io/prometheus-adapter/prometheus-adapter:v0.12.0
        args:
        - --prometheus-url=http://prometheus.hpa-overshoot.svc:9090
        - --metrics-relist-interval=30s
        - --config=/etc/adapter/config.yaml
        - --secure-port=6443
        - --cert-dir=/tmp/cert
        ports:
        - containerPort: 6443
          name: https
        volumeMounts:
        - name: config
          mountPath: /etc/adapter
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: prometheus-adapter-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-adapter
  namespace: hpa-overshoot
spec:
  selector:
    app: prometheus-adapter
  ports:
  - port: 443
    targetPort: 6443
    name: https
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.external.metrics.k8s.io
spec:
  service:
    name: prometheus-adapter
    namespace: hpa-overshoot
  group: external.metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100
