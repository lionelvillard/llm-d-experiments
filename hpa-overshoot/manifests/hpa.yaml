apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
  namespace: hpa-overshoot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 1
  maxReplicas: 25000
  metrics:
  - type: External
    external:
      metric:
        name: queue_length
      target:
        type: Value
        value: "250"
